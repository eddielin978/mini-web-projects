<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HTML Element Creator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main>
      <section class="container">
        <h1>HTML Element Creator</h1>
        <section class="button-row">
          <button class="btn h1-btn">Add H1</button>
          <button class="btn h2-btn">Add H2</button>
          <button class="btn h3-btn">Add H3</button>
          <button class="btn p-btn">Add p</button>
          <button class="btn btn-btn">Add button</button>
          <button class="btn square-btn">Add square</button>
          <button class="btn circle-btn">Add circle</button>
          <button class="btn list-btn">Add list</button>
        </section>
        <section class="space"></section>
        <section class="templates">
          <template class="list-template">
            <ul>
              <li>Item 1</li>
              <li>Item 2</li>
              <li>Item 3</li>
            </ul>
          </template>
        </section>
      </section>
    </main>
    <script src="script.js"></script>
  </body>
</html>
