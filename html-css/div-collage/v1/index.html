<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Div Collage</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Div Collage</h1>
    <section class="button-row">
      <button>Uniform grid</button><button>Mixed rectangles</button><button>Freeform</button>
    </section>
    <section class="uniform-grid">
      <div class="div red-div"></div>
      <div class="div orange-div"></div>
      <div class="div yellow-div"></div>
      <div class="div green-div"></div>
      <div class="div blue-div"></div>
      <div class="div purple-div"></div>
      <div class="div pink-div"></div>
      <div class="div black-div"></div>
      <div class="div gray-div"></div>
      <div class="div brown-div"></div>
    </section>
    <section class="mixed-rectangles">
      <div class="div red-div"></div>
      <div class="div orange-div"></div>
      <div class="div yellow-div"></div>
      <div class="div green-div"></div>
      <div class="div blue-div"></div>
      <div class="div purple-div"></div>
      <div class="div pink-div"></div>
      <div class="div black-div"></div>
      <div class="div gray-div"></div>
      <div class="div brown-div"></div>
    </section>
    <section class="freeform-grid">
      <div class="div red-div"></div>
      <div class="div orange-div"></div>
      <div class="div yellow-div"></div>
      <div class="div green-div"></div>
      <div class="div blue-div"></div>
      <div class="div purple-div"></div>
      <div class="div pink-div"></div>
      <div class="div black-div"></div>
      <div class="div gray-div"></div>
      <div class="div brown-div"></div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
